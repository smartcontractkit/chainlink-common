name: CRE settings schema reminder

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for // Deprecated in settings.go diff
        id: deprecated
        run: |
          git fetch origin "${{ github.base_ref }}"
          if git diff "origin/${{ github.base_ref }}...HEAD" -- pkg/settings/cresettings/settings.go \
            | grep -E '^\+.*// Deprecated' -q; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: PR reminder
        if: steps.deprecated.outputs.found == 'true'
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body-includes: "<!-- cre-settings-schema-reminder -->"
          body: |
            <!-- cre-settings-schema-reminder -->
            ### CRE settings field deprecated

            This PR adds `// Deprecated` in [`pkg/settings/cresettings/settings.go`](https://github.com/smartcontractkit/chainlink-common/blob/main/pkg/settings/cresettings/settings.go).

            When making the corresponding **capabilities** change (where this settings field is consumed), keep the change **backward compatible** — the new code should still respect the old field.

            **Rollout:**
            1. Ship the capability change that reads both old and new fields.
            2. After the release is live, propose job specs in [chainlink-deployments](https://github.com/smartcontractkit/chainlink-deployments) using the new schema (check `domains/cre/*/settings/*.toml` for existing overrides on the deprecated field).
            3. In a **subsequent** release, remove the old field from the capability code.
