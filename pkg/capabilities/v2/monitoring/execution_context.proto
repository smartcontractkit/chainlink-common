syntax = "proto3";
package capabilities.v2.monitoring;

option go_package = "github.com/smartcontractkit/chainlink-common/pkg/capabilities/v2/monitoring";

// ExecutionContext carries the shared observability fields attached to every
// capability lifecycle event. It intentionally mirrors
// capabilities/libs/monitoring.ExecutionContext in the capabilities binary repo
// so that beholder consumers see a consistent schema.
message ExecutionContext {
  // Source node identity.
  string meta_source_id = 1;

  // Chain context (populated by chain capabilities; empty for compute/HTTP).
  string meta_chain_family_name = 2;
  string meta_chain_id         = 3;
  string meta_network_name     = 4;
  string meta_network_name_full = 5;

  // Workflow context (mirrors capabilities.RequestMetadata fields).
  string meta_workflow_id               = 6;
  string meta_workflow_owner            = 7;
  string meta_workflow_execution_id     = 8;
  string meta_workflow_name             = 9;
  uint32 meta_workflow_don_id           = 10;
  uint32 meta_workflow_don_config_version = 11;
  string meta_reference_id              = 12;

  // Capability context.
  string meta_capability_type            = 13;
  string meta_capability_id             = 14;
  uint64 meta_capability_timestamp_start = 15; // ms since epoch
  uint64 meta_capability_timestamp_emit  = 16; // ms since epoch
}
