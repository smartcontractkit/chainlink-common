syntax = "proto3";

package shared;

option go_package = "github.com/smartcontractkit/chainlink-common/pkg/network/proxy";

service BinaryNetworkEndpointProxy {
  rpc Connect(stream BinaryNetworkClientRequest) returns (stream BinaryMessageWithSender);
}

message BinaryNetworkClientRequest {
  oneof message {
    NewEndpointRequest newEndpoint = 1;
    SendToRequest sendTo = 2;
    bytes broadcast = 3;
  }
}

message NewEndpointRequest {
  bytes config_digest = 1;
  repeated string peer_ids = 2;
  repeated BootstrapperLocator v2_bootstrappers = 3;
  int32 failure_threshold = 4;
  BinaryNetworkEndpointLimits limits = 5;
}

message BootstrapperLocator {
  string peer_id = 1;
  repeated string addrs = 2;
}

message BinaryNetworkEndpointLimits {
  int32 max_message_length = 1;
  double messages_rate_per_oracle = 2;
  int32 messages_capacity_per_oracle = 3;
  double bytes_rate_per_oracle = 4;
  int32 bytes_capacity_per_oracle = 5;
}

message SendToRequest {
  bytes payload = 2;
  uint32 to_oracle_id = 3;
}

message BinaryMessageWithSender {
  bytes msg = 1;
  uint32 sender = 2;
}

// PeerGroupProxy exposes libocr's networking.PeerGroupFactory over the network
// for DON-to-DON communication. It shares the same underlying rage peer (and
// discoverer) as BinaryNetworkEndpointProxy.
service PeerGroupProxy {
  // Connect manages the lifetime of a single PeerGroup. The first message on
  // the stream must be NewPeerGroup. Streams opened within the group are
  // multiplexed over this one connection; closing the connection closes the
  // group and all of its streams.
  rpc Connect(stream PeerGroupClientRequest) returns (stream PeerGroupServerMessage);
}

message PeerGroupClientRequest {
  oneof message {
    NewPeerGroupRequest new_peer_group = 1; // must be the first message
    NewStreamRequest new_stream = 2;
    CloseStreamRequest close_stream = 3;
    StreamSend stream_send = 4;
  }
}

message NewPeerGroupRequest {
  bytes config_digest = 1;
  repeated string peer_ids = 2;
  repeated BootstrapperLocator v2_bootstrappers = 3;
}

message NewStreamRequest {
  // stream_id is a client-assigned handle used to correlate SendTo/Recv/Close
  // for this stream within the group connection.
  string stream_id = 1;
  string remote_peer_id = 2;
  string stream_name = 3;
  int32 outgoing_buffer_size = 4;
  int32 incoming_buffer_size = 5;
  int32 max_message_length = 6;
  TokenBucketParams messages_limit = 7;
  TokenBucketParams bytes_limit = 8;
}

message TokenBucketParams {
  double rate = 1;
  uint32 capacity = 2;
}

message CloseStreamRequest {
  string stream_id = 1;
}

message StreamSend {
  string stream_id = 1;
  bytes payload = 2;
}

message PeerGroupServerMessage {
  oneof message {
    StreamRecv stream_recv = 1;
  }
}

message StreamRecv {
  string stream_id = 1;
  bytes payload = 2;
}
