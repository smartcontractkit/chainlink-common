syntax = "proto3";
package capabilities.v2.monitoring;

option go_package = "github.com/smartcontractkit/chainlink-common/pkg/capabilities/v2/monitoring";

import "monitoring/execution_context.proto";

// CapabilityActionInitiated is emitted just before a capability action method executes.
message CapabilityActionInitiated {
  string method            = 1; // RPC method name, e.g. "WriteReport"
  ExecutionContext execution_context = 20;
}

// CapabilityActionSuccess is emitted when a capability action method returns without error.
message CapabilityActionSuccess {
  string method            = 1;
  ExecutionContext execution_context = 20;
}

// CapabilityActionError is emitted when a capability action method returns an error.
message CapabilityActionError {
  string method        = 1;
  string summary       = 2; // human-readable summary
  string cause         = 3; // raw error string
  bool   is_user_error = 4; // true → OriginUser, false → OriginSystem
  ExecutionContext execution_context = 20;
}
