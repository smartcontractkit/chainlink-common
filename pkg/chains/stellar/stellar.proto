syntax = "proto3";
option go_package = "github.com/smartcontractkit/chainlink-common/pkg/chains/stellar";

import "google/protobuf/empty.proto";
import "capabilities/blockchain/stellar/v1alpha/scval.proto";

package loop.stellar;

service Stellar {
  rpc GetLedgerEntries(GetLedgerEntriesRequest) returns (GetLedgerEntriesResponse);
  rpc GetLatestLedger(google.protobuf.Empty) returns (GetLatestLedgerResponse);
  rpc ReadContract(ReadContractRequest) returns (ReadContractResponse);
}

// ReadContractRequest invokes a read-only (simulation) Soroban contract function.
message ReadContractRequest {
  string                                           contract_id     = 1; // Stellar contract address (C… StrKey)
  string                                           function        = 2; // Soroban function name
  repeated capabilities.blockchain.stellar.v1alpha.ScVal args     = 3; // Typed Soroban arguments
  // Optional: ledger to simulate against; 0 means use the latest.
  uint32                                           ledger_sequence = 4;
}

// ReadContractResponse carries the return value of the simulated call.
message ReadContractResponse {
  capabilities.blockchain.stellar.v1alpha.ScVal result          = 1; // Return value (only valid when error is empty)
  uint32                                         ledger_sequence = 2; // Ledger actually used for the simulation
  string                                         error           = 3; // Non-empty on failure
}

// GetLedgerEntriesRequest fetches ledger entries by XDR-encoded keys.
message GetLedgerEntriesRequest {
  repeated bytes keys = 1;  // each key as binary XDR (LedgerKey)
}

// LedgerEntryResult is a single ledger entry.
message LedgerEntryResult {
  bytes  key_xdr = 1;   // LedgerKey binary XDR
  bytes  data_xdr = 2;  // LedgerEntry binary XDR
  uint32 last_modified_ledger = 3;
  // has_live_until_ledger_seq indicates whether live_until_ledger_seq is set.
  bool   has_live_until_ledger_seq = 4;
  uint32 live_until_ledger_seq = 5;
  bytes  extension_xdr = 6;  // LedgerEntry extension binary XDR; empty if absent
}

// GetLedgerEntriesResponse contains the requested ledger entries.
message GetLedgerEntriesResponse {
  repeated LedgerEntryResult entries = 1;
  uint32 latest_ledger = 2;
}

// GetLatestLedgerResponse holds current ledger state.
message GetLatestLedgerResponse {
  bytes  hash = 1;              // 32-byte raw ledger hash
  uint32 protocol_version = 2;
  uint32 sequence = 3;
  int64  ledger_close_time = 4;
  bytes  ledger_header_xdr = 5;   // LedgerHeader binary XDR
  bytes  ledger_metadata_xdr = 6; // LedgerCloseMetaV2 binary XDR
}
