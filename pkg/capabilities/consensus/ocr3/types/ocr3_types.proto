syntax = "proto3";

option go_package = "capabilities/consensus/ocr3/types";

package ocr3_types;

import "values/v1/values.proto";
import "google/protobuf/timestamp.proto";

// per-workflow aggregation outcome
message AggregationOutcome {
  values.v1.Map encodableOutcome = 1; // passed to encoders
  bytes metadata = 2; // internal to the aggregator
  bool shouldReport = 3;
  uint64 lastSeenAt = 4; // this is the equivalent of a SeqNr
  google.protobuf.Timestamp timestamp = 5; // current time of the node
  string encoderName = 6; // optional dynamic encoder override
  values.v1.Map encoderConfig = 7; // optional dynamic encoder config
}

message Query {
  // the requests to get consensus on.
  repeated Id ids = 1;
}

message Id {
  reserved 5;
  string workflowExecutionId = 1;
  string workflowId = 2;
  string workflowOwner = 3;
  string workflowName = 4;
  string reportId = 6;
  uint32 workflowDonId = 7;
  uint32 workflowDonConfigVersion = 8;
  string keyId = 9;
}

message Observation {
  Id id = 1;
  // list of observations defined in inputs.observations
  values.v1.List observations = 4;
  string overriddenEncoderName = 5;
  values.v1.Map overriddenEncoderConfig = 6;
}

message Observations {
  // batched observations for multiple workflow execution IDs
  repeated Observation observations = 1;
  // the workflow IDs that are registered in the node
  repeated string registeredWorkflowIds = 2;
  // the node's current current time
  google.protobuf.Timestamp timestamp = 3;
}

message Report {
  Id id = 1;
  AggregationOutcome outcome = 2;
}

message ReportInfo {
  Id id = 1;
  bool should_report = 2;
}

message Outcome {
  map<string, AggregationOutcome> outcomes = 1;
  repeated Report current_reports = 2;
}

// --- OCR3_1-only messages (added under OCRBump) ---------------------------
//
// Under OCR3_1 the bulk per-request values.List payload moves to blobs, keeping
// the on-wire observation well under the 512 KiB OCR3_1 cap. The existing
// Observations message is broadcast as the blob contents; BlobbedObservation
// is what travels the consensus channel and carries only the blob handle plus
// small metadata.
message BlobbedObservation {
  // Handle returned by BlobBroadcastFetcher.BroadcastBlob. The fetching node
  // calls FetchBlob(handle) to retrieve the Observations payload.
  bytes blob_handle = 1;

  // IDs this observation has data for. Mirrors the Observations.observations
  // list' Id fields so ValidateObservation can reject mismatches without
  // dereferencing the blob.
  repeated Id ids = 2;

  // Node timestamp, carried out-of-blob so StateTransition can compute the
  // median timestamp without fetching every blob first.
  google.protobuf.Timestamp timestamp = 3;

  // Registered workflow IDs on this node; carried out-of-blob for the same
  // reason as `timestamp`.
  repeated string registered_workflow_ids = 4;
}

// OutcomeEnvelope wraps a per-workflow AggregationOutcome stored in the
// OCR3_1 replicated KV. The explicit version field lets us detect stored
// values from older schemas and migrate. Never reuse a version number with
// an incompatible payload — bump the number and add a new key prefix.
message OutcomeEnvelope {
  uint32 version = 1;                // currently 1
  AggregationOutcome outcome = 2;
}
